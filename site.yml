- name: Npmplus deployen
  hosts: npmplus
  roles:
    - npmplus

- name: Zabbix deployen
  hosts: zabbix
  roles:
    - zabbix

- name: Mqtt deployen
  hosts: mqtt
  roles:
    - mqtt

- name: Zigbee2mqtt deployen
  hosts: zigbee2mqtt
  roles:
    - zigbee2mqtt

- name: Ntfy deployen
  hosts: ntfy
  roles:
    - ntfy

- name: Proxmox deployen
  hosts: proxmox
  roles:
