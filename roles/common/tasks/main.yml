---
- name: Zeitzone setzen
  community.general.timezone:
    name: Europe/Berlin

- name: Basis-Pakete installieren
  ansible.builtin.package:
    name:
      - curl
      - wget
      - vim
      - htop
      - ca-certificates
      - unattended-upgrades
      - apt-listchanges
    state: present

- name: unattended-upgrades konfigurieren
  ansible.builtin.template:
    src: unattended-upgrades.conf.j2
    dest: /etc/apt/apt.conf.d/50unattended-upgrades
    owner: root
    group: root
    mode: '0644'

- name: auto-upgrades aktivieren
  ansible.builtin.template:
    src: auto-upgrades.conf.j2
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    owner: root
    group: root
    mode: '0644'

- name: SSH-Config härten
  ansible.builtin.template:
    src: sshd_config.j2
    dest: /etc/ssh/sshd_config.d/99-hardening.conf
    owner: root
    group: root
    mode: '0644'
  notify: sshd neu starten
