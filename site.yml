- name: Zabbix Agent auf allen Hosts deployen
  hosts: all:!lxc_alpine
  roles:
    - zabbix_agent

- name: Keepalived deployen
  hosts:
    - technitiumdns
    - piNAS
  roles:
    - keepalived

- name: Frigate deployen
  hosts: frigate
  roles:
    - frigate

- name: Paperless deployen
  hosts: paperless
  roles:
