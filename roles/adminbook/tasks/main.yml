---
- name: Zshrc deployen
  ansible.builtin.template:
    src: zshrc.j2
    dest: "{{ ansible_facts['env']['HOME'] }}/.zshrc"
    owner: "{{ ansible_facts['user_id'] }}"
    mode: '0644'

- name: Kitty Config-Verzeichnis erstellen
  ansible.builtin.file:
    path: "{{ ansible_facts['env']['HOME'] }}/.config/kitty"
    state: directory
    mode: '0755'

- name: Kitty.conf deployen
  ansible.builtin.copy:
    src: kitty.conf
    dest: "{{ ansible_facts['env']['HOME'] }}/.config/kitty/kitty.conf"
    owner: "{{ ansible_facts['user_id'] }}"
    mode: '0644'

- name: Starship.toml deployen
  ansible.builtin.template:
    src: starship.toml.j2
    dest: "{{ ansible_facts['env']['HOME'] }}/.config/starship.toml"
    owner: "{{ ansible_facts['user_id'] }}"
    mode: '0644'

- name: GnuPG-Verzeichnis erstellen
  ansible.builtin.file:
    path: "{{ ansible_facts['env']['HOME'] }}/.gnupg"
    state: directory
    mode: '0700'

- name: Gpg-agent.conf deployen
  ansible.builtin.copy:
    src: gpg-agent.conf
    dest: "{{ ansible_facts['env']['HOME'] }}/.gnupg/gpg-agent.conf"
    owner: "{{ ansible_facts['user_id'] }}"
    mode: '0600'

- name: Scdaemon.conf deployen
  ansible.builtin.copy:
    src: scdaemon.conf
    dest: "{{ ansible_facts['env']['HOME'] }}/.gnupg/scdaemon.conf"
    owner: "{{ ansible_facts['user_id'] }}"
    mode: '0600'

- name: Kitty Nord-Theme deployen
  ansible.builtin.copy:
    src: nord-theme.conf
    dest: "{{ ansible_facts['env']['HOME'] }}/.config/kitty/nord-theme.conf"
    owner: "{{ ansible_facts['user_id'] }}"
    mode: '0644'

- name: VS Code Settings deployen
  ansible.builtin.copy:
    src: vscode-settings.json
    dest: "{{ ansible_facts['env']['HOME'] }}/.config/Code/User/settings.json"
    owner: "{{ ansible_facts['user_id'] }}"
    mode: '0644'

- name: VS Code Extensions installieren
  ansible.builtin.command:
    cmd: "code --install-extension {{ item }}"
  loop: "{{ lookup('file', 'vscode-extensions.txt').splitlines() }}"
  changed_when: true

- name: .gitconfig deployen
  ansible.builtin.copy:
    src: gitconfig
    dest: "{{ ansible_facts['env']['HOME'] }}/.gitconfig"
    owner: "{{ ansible_facts['user_id'] }}"
    mode: '0644'

- name: .ssh Verzeichnis erstellen
  ansible.builtin.file:
    path: "{{ ansible_facts['env']['HOME'] }}/.ssh"
    state: directory
    mode: '0700'

- name: SSH config deployen
  ansible.builtin.copy:
    src: ssh_config
    dest: "{{ ansible_facts['env']['HOME'] }}/.ssh/config"
    owner: "{{ ansible_facts['user_id'] }}"
    mode: '0600'

- name: CLI-Tools installieren
  ansible.builtin.package:
    name:
      - bat
      - eza
      - fzf
      - zoxide
      - btop
    state: present
  become: true
